model:
  name: unet
  in_channels: 4
  num_classes: 4
  base_channels: 32

data:
  processed_dir: data/processed
  patch_size: [128, 128, 128]
  val_fraction: 0.2

train:
  epochs: 100
  batch_size: 2
  lr: 0.0001
  weight_decay: 0.00001
  dice_weight: 0.5
  num_workers: 4
  checkpoint_dir: checkpoints
